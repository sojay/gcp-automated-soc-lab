[honeypot]
# Replace values with your deployed VM details.
cowrie-1 ansible_host=<COWRIE_PUBLIC_IP> ansible_user=<COWRIE_SSH_USER> ansible_port=2022 ansible_ssh_private_key_file=~/.ssh/google_compute_engine

[logging]
# Uses IAP tunnel and OS Login username by default.
logging-1 ansible_host=logging-1 ansible_user=<OS_LOGIN_USER> ansible_port=22 ansible_ssh_private_key_file=~/.ssh/google_compute_engine ansible_ssh_common_args='-o ProxyCommand="gcloud compute start-iap-tunnel %h %p --listen-on-stdin --project=<PROJECT_ID> --zone=<LOGGING_ZONE>"'
